<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>S4 — 数据预处理与信号处理流水线</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#94a3b8;--accent:#3b82f6;--accent2:#06b6d4}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
h2{font-size:1.25rem;color:var(--accent);margin:2rem 0 1rem;border-left:3px solid var(--accent);padding-left:.75rem}
.sub{color:var(--dim);font-size:1.05rem;margin-bottom:2rem}
.badge{display:inline-block;background:var(--accent);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:10px;margin-right:6px}
.pipeline{display:flex;flex-wrap:wrap;gap:.75rem;margin:1rem 0}
.step{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:.9rem;flex:1 1 140px;text-align:center;transition:border-color .2s}
.step:hover{border-color:var(--accent)}
.step b{display:block;color:var(--accent2);margin-bottom:4px}
.controls{background:var(--card);border-radius:10px;padding:1.5rem;margin:1rem 0;border:1px solid var(--border)}
label{display:inline-flex;align-items:center;gap:6px;margin:4px 12px 4px 0;font-size:.9rem;cursor:pointer}
button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.9rem;margin:8px 6px 0 0;transition:opacity .2s}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:default}
.chart-wrap{background:var(--card);border-radius:10px;padding:1rem;margin:1rem 0;border:1px solid var(--border)}
canvas{max-height:260px}
table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:.85rem}
th,td{padding:6px 10px;border:1px solid var(--border);text-align:left}
th{background:var(--card);color:var(--accent)}
#status{color:var(--accent2);font-size:.85rem;margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <span class="badge">S4</span><span class="badge">信号处理</span>
  <h1>数据预处理与信号处理流水线</h1>
  <p class="sub">超声信号预处理 · 多域特征提取 · 时空对齐</p>

  <h2>处理流水线</h2>
  <div class="pipeline">
    <div class="step"><b>DC去除</b>直流分量</div>
    <div class="step"><b>带通滤波</b>2-8 MHz</div>
    <div class="step"><b>小波去噪</b>db8 5级</div>
    <div class="step"><b>中值滤波</b>脉冲噪声</div>
    <div class="step"><b>基线校正</b>多项式拟合</div>
    <div class="step"><b>归一化</b>峰值/Z-score</div>
  </div>

  <h2>在线演示</h2>
  <div class="controls">
    <p style="margin-bottom:8px"><b>预处理步骤：</b></p>
    <label><input type="checkbox" value="dc_removal" checked> DC去除</label>
    <label><input type="checkbox" value="bandpass" checked> 带通滤波</label>
    <label><input type="checkbox" value="normalize" checked> 归一化</label>
    <label><input type="checkbox" value="wavelet"> 小波去噪</label>
    <label><input type="checkbox" value="median"> 中值滤波</label>
    <label><input type="checkbox" value="baseline"> 基线校正</label>
    <br>
    <button onclick="runPreprocess()">处理信号</button>
    <button onclick="runFeatures()">提取特征</button>
    <div id="status"></div>
  </div>

  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div id="feat-table"></div>
</div>
<script>
const N=500,fs=40e6;
let rawSignal=[], chart=null;

function genSignal(){
  rawSignal=[];
  for(let i=0;i<N;i++){
    const t=i/fs;
    rawSignal.push(Math.sin(2*Math.PI*5e6*t)*0.8+Math.sin(2*Math.PI*2e6*t)*0.3+(Math.random()-0.5)*0.4+0.2);
  }
}
genSignal();

function initChart(){
  const ctx=document.getElementById('chart').getContext('2d');
  chart=new Chart(ctx,{type:'line',data:{labels:rawSignal.map((_,i)=>i),datasets:[
    {label:'原始信号',data:rawSignal,borderColor:'#64748b',borderWidth:1,pointRadius:0},
    {label:'处理后',data:[],borderColor:'#3b82f6',borderWidth:1.5,pointRadius:0}
  ]},options:{responsive:true,animation:{duration:300},scales:{x:{display:false},y:{grid:{color:'#1e293b'}}},plugins:{legend:{labels:{color:'#94a3b8'}}}}});
}
initChart();

async function runPreprocess(){
  const s=document.getElementById('status');
  s.textContent='处理中...';
  const steps=[...document.querySelectorAll('.controls input:checked')].map(e=>e.value);
  try{
    const r=await fetch('/api/preprocess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signal:rawSignal,sampling_rate:fs,steps})});
    const d=await r.json();
    chart.data.datasets[1].data=d.processed||d.detail;
    chart.update();
    s.textContent=`完成，输出 ${(d.processed||[]).length} 个采样点`;
  }catch(e){s.textContent='请求失败: '+e.message}
}

async function runFeatures(){
  const s=document.getElementById('status');
  s.textContent='提取特征中...';
  try{
    const r=await fetch('/api/features',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signal:rawSignal,sampling_rate:fs})});
    const d=await r.json();
    const f=d.features||{};
    let html='<table><tr><th>特征名</th><th>值</th></tr>';
    for(const[k,v]of Object.entries(f))html+=`<tr><td>${k}</td><td>${typeof v==='number'?v.toFixed(6):v}</td></tr>`;
    html+='</table>';
    document.getElementById('feat-table').innerHTML=html;
    s.textContent=`提取到 ${Object.keys(f).length} 个特征`;
  }catch(e){s.textContent='请求失败: '+e.message}
}
</script>
</body>
</html>
