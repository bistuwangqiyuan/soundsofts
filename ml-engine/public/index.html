<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>S2 — 声力耦合回归模型训练与推理引擎</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1b2a;--card:#1b263b;--border:#415a77;--text:#e0e1dd;--dim:#778da9;--accent:#2ec4b6;--red:#e63946}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#a8dadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
h2{font-size:1.25rem;color:var(--accent);margin:2rem 0 1rem;border-left:3px solid var(--accent);padding-left:.75rem}
.sub{color:var(--dim);margin-bottom:2rem}
.badge{display:inline-block;background:var(--accent);color:#0d1b2a;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:10px;margin-right:6px}
.models{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin:1rem 0}
.model-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:.2s}
.model-card:hover,.model-card.active{border-color:var(--accent);transform:translateY(-2px)}
.model-card b{display:block;color:var(--accent);margin-bottom:4px}
.model-card small{color:var(--dim);font-size:.8rem}
.controls{background:var(--card);border-radius:10px;padding:1.25rem;margin:1rem 0;border:1px solid var(--border);display:flex;flex-wrap:wrap;gap:1rem;align-items:end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8rem;color:var(--dim)}
.field input,.field select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;width:120px}
button{background:var(--accent);color:#0d1b2a;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:600;transition:opacity .2s}
button:hover{opacity:.85}
.chart-wrap{background:var(--card);border-radius:10px;padding:1rem;margin:1rem 0;border:1px solid var(--border)}
canvas{max-height:260px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin:1rem 0}
.metric{background:var(--card);border-radius:10px;padding:1rem;text-align:center;border:1px solid var(--border)}
.metric .val{font-size:1.6rem;font-weight:700;color:var(--accent)}
.metric .lbl{font-size:.8rem;color:var(--dim)}
#status{color:var(--accent);font-size:.85rem;margin:6px 0}
</style>
</head>
<body>
<div class="container">
  <span class="badge">S2</span><span class="badge">ML Pipeline</span>
  <h1>声力耦合回归模型训练与推理引擎</h1>
  <p class="sub">6种回归模型训练、超参优化与ONNX部署 · Random Forest MAPE=1.30%</p>

  <h2>支持的模型</h2>
  <div class="models" id="model-list"></div>

  <h2>在线训练演示</h2>
  <div class="controls">
    <div class="field"><label>样本数</label><input id="n_samples" type="number" value="300" min="50" max="2000"></div>
    <div class="field"><label>特征维度</label><input id="n_features" type="number" value="5" min="2" max="20"></div>
    <div class="field"><label>噪声系数</label><input id="noise" type="number" value="0.1" min="0" max="1" step="0.05"></div>
    <button onclick="train()">开始训练</button>
  </div>
  <div id="status"></div>

  <div class="metrics" id="metrics" style="display:none">
    <div class="metric"><div class="val" id="m-mae">-</div><div class="lbl">MAE</div></div>
    <div class="metric"><div class="val" id="m-rmse">-</div><div class="lbl">RMSE</div></div>
    <div class="metric"><div class="val" id="m-r2">-</div><div class="lbl">R²</div></div>
    <div class="metric"><div class="val" id="m-mape">-</div><div class="lbl">MAPE (%)</div></div>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>
<script>
const MODELS=[
  {name:'random_forest',label:'随机森林',desc:'集成学习 · MAPE=1.30%'},
  {name:'xgboost',label:'XGBoost',desc:'梯度提升树'},
  {name:'lightgbm',label:'LightGBM',desc:'直方图提升'},
  {name:'svr',label:'SVR',desc:'支持向量回归'},
  {name:'linear_regression',label:'线性回归',desc:'经典线性'},
  {name:'cnn_1d',label:'1D-CNN',desc:'一维卷积网络'}
];
let selected='random_forest',chart=null;

const ml=document.getElementById('model-list');
MODELS.forEach(m=>{
  const d=document.createElement('div');
  d.className='model-card'+(m.name===selected?' active':'');
  d.innerHTML=`<b>${m.label}</b><small>${m.desc}</small>`;
  d.onclick=()=>{selected=m.name;ml.querySelectorAll('.model-card').forEach(c=>c.classList.remove('active'));d.classList.add('active')};
  ml.appendChild(d);
});

const ctx=document.getElementById('chart').getContext('2d');
chart=new Chart(ctx,{type:'scatter',data:{datasets:[
  {label:'预测值 vs 真实值',data:[],backgroundColor:'rgba(46,196,182,.6)',pointRadius:4},
  {label:'理想线',data:[],borderColor:'#e63946',borderWidth:1.5,pointRadius:0,type:'line',showLine:true}
]},options:{responsive:true,animation:{duration:300},scales:{x:{title:{display:true,text:'真实值',color:'#778da9'},grid:{color:'#1b263b'}},y:{title:{display:true,text:'预测值',color:'#778da9'},grid:{color:'#1b263b'}}},plugins:{legend:{labels:{color:'#778da9'}}}}});

async function train(){
  const s=document.getElementById('status');
  s.textContent='训练中…';
  try{
    const r=await fetch('/api/train',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model_type:selected,n_samples:+document.getElementById('n_samples').value,
      n_features:+document.getElementById('n_features').value,noise:+document.getElementById('noise').value
    })});
    const d=await r.json();
    if(d.metrics){
      document.getElementById('metrics').style.display='grid';
      document.getElementById('m-mae').textContent=d.metrics.MAE;
      document.getElementById('m-rmse').textContent=d.metrics.RMSE;
      document.getElementById('m-r2').textContent=d.metrics.R2;
      document.getElementById('m-mape').textContent=d.metrics.MAPE;
      const pts=d.sample_actual.map((a,i)=>({x:a,y:d.sample_predictions[i]}));
      chart.data.datasets[0].data=pts;
      const mn=Math.min(...d.sample_actual),mx=Math.max(...d.sample_actual);
      chart.data.datasets[1].data=[{x:mn,y:mn},{x:mx,y:mx}];
      chart.update();
      s.textContent=`${d.model} 训练完成（${d.n_train}训练/${d.n_test}测试）`;
    }else{s.textContent=JSON.stringify(d)}
  }catch(e){s.textContent='请求失败: '+e.message}
}
</script>
</body>
</html>
