model:
  encoder: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 3
  classes: 1

training:
  epochs: 100
  batch_size: 8
  learning_rate: 0.0003
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "onecycle"
  early_stopping_patience: 15

loss:
  bce_weight: 0.5
  dice_weight: 0.5

data:
  image_size: [384, 768]
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  scale_limit: 0.2
  rotate_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  gaussian_noise_var_limit: [10, 50]
  elastic_transform_alpha: 120
