[DAQ]
device = USB-6363
sample_rate = 250000
bits = 16
channels = ai0,ai1,ai2
trigger_source = PFI0

[FPGA]
bitfile = FPGA/FPGA_Bitfile.lvbitx
trigger_interval_mm = 1.0
sync_timeout_ms = 100

[Ultrasonic]
frequency_mhz = 5.0
sampling_rate_mhz = 40
probe_type = water_immersion_focused
scan_mode = c_scan
gate_start_us = 2.0
gate_end_us = 15.0

[Force]
sensor_type = s_type
full_scale_n = 500
sampling_rate_hz = 1000
zero_offset = 0.0
calibration_factor = 1.0

[Position]
encoder_type = incremental_optical
resolution_mm = 0.01
direction = forward

[Storage]
format = hdf5
output_dir = ./data
auto_save = true
flush_interval_s = 5

[Display]
refresh_rate_hz = 30
waveform_points = 2000
force_history_s = 60

[Alarm]
force_max_n = 450
force_min_n = 0
sync_error_max_ms = 5
temperature_max_c = 50
