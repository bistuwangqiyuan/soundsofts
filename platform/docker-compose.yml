version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    env_file: .env
    volumes:
      - model_data:/app/models
      - report_data:/app/reports
      - hdf5_data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soundsofts}
      POSTGRES_USER: ${POSTGRES_USER:-soundsofts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  torchserve:
    build:
      context: ./model-serving
      dockerfile: ../docker/Dockerfile.torchserve
    volumes:
      - model_data:/app/model-store
    environment:
      TS_CONFIG_FILE: /app/config.properties
    restart: unless-stopped

  frontend-build:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    volumes:
      - frontend_dist:/app/dist

volumes:
  pg_data:
  redis_data:
  model_data:
  report_data:
  hdf5_data:
  frontend_dist:
